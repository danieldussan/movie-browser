upstream backend {
    server backend:8080;
}

# Reutilizable con proxy_pass hacia el backend
map $uri $proxy_to_backend {
    default 0;
    ~^/api/         1;
    ~^/swagger-ui   1;
    ~^/v3/api-docs  1;
    ~^/webjars/     1;
}

server {
    listen 80;

    # Headers comunes de proxy
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # API REST
    location /api/ {
        proxy_pass http://backend;
    }

    # ── Swagger / OpenAPI ──────────────────────────────────────────────────

    # Redirección principal de Swagger UI
    location = /swagger-ui.html {
        proxy_pass http://backend;
    }

    # Todos los assets de Swagger UI (JS, CSS, etc.)
    location /swagger-ui/ {
        proxy_pass http://backend;
    }

    # OpenAPI JSON (endpoint principal)
    location = /v3/api-docs {
        proxy_pass http://backend;
    }

    # OpenAPI YAML
    location = /v3/api-docs.yaml {
        proxy_pass http://backend;
    }

    # OpenAPI por grupos / paths adicionales
    location /v3/api-docs/ {
        proxy_pass http://backend;
    }

    # Webjars (dependencias estáticas de Swagger UI)
    location /webjars/ {
        proxy_pass http://backend;
    }
}
