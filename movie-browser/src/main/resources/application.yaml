spring:
  application:
    name: movie-browser
  jackson:
    default-property-inclusion: non_null
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/simple_users_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
imdb:
  api-url: